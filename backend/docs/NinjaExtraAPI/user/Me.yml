info:
  name: Me
  type: http
  seq: 1
  tags:
    - user

http:
  method: GET
  url: "{{baseUrl}}/api/accounts/me"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

