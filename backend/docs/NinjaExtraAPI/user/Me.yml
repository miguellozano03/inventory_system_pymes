          value: application/json
      body:
        type: json
        data: |-
          {
            "last_login": "",
            "is_superuser": false,
            "id": "",
            "company": "",
            "role": "",
            "email": "",
            "first_name": "",
            "last_name": "",
            "identification": "",
            "is_active": false,
            "is_staff": false,
            "created_at": "",
            "updated_at": "",
            "groups": [],
            "user_permissions": []
          }
