info:
  name: List Transactions
  type: http
  seq: 1
  tags:
    - Inventory_-_Transactions

http:
  method: GET
  url: "{{baseUrl}}/api/transactions"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/transactions"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "type": "",
              "total": 0,
              "customer_id": "",
              "supplier_id": "",
              "created_at": "",
              "details": [
                {
                  "id": "",
                  "product_id": "",
                  "product_name": "",
                  "quantity": 0,
                  "unit_price": 0,
                  "subtotal": 0
                }
              ]
            }
          ]
