info:
  name: List Products
  type: http
  seq: 1
  tags:
    - Inventory_-_Products

http:
  method: GET
  url: "{{baseUrl}}/api/inventory/products"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/inventory/products"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "company_id": "",
              "category_id": "",
              "supplier_id": "",
              "internal_reference": "",
              "name": "",
              "description": "",
              "stock": 0,
              "cost_price": "",
              "sale_price": "",
              "is_active": false,
              "created_at": "",
              "updated_at": ""
            }
          ]
