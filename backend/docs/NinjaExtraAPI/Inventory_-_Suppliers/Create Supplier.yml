          {
            "name": "",
            "contact_name": "",
            "email": "",
            "phone": "",
            "address": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "company_id": "",
