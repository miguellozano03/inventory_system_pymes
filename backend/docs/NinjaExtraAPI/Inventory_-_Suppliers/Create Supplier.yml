info:
  name: Create Supplier
  type: http
  seq: 2
  tags:
    - Inventory_-_Suppliers

http:
  method: POST
  url: "{{baseUrl}}/api/contacts/suppliers"
  body:
    type: json
    data: |-
      {
        "name": "",
        "contact_name": "",
        "email": "",
        "phone": "",
        "address": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

