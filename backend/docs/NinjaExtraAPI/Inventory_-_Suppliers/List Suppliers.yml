info:
  name: List Suppliers
  type: http
  seq: 1
  tags:
    - Inventory_-_Suppliers

http:
  method: GET
  url: "{{baseUrl}}/api/contacts/suppliers"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/contacts/suppliers"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "company_id": "",
              "name": "",
              "contact_name": "",
              "email": "",
              "phone": "",
              "address": "",
              "created_at": "",
              "updated_at": ""
            }
          ]
