info:
  name: Obtain Token
  type: http
  seq: 1
  tags:
    - token

http:
  method: POST
  url: "{{baseUrl}}/api/token/pair"
  body:
    type: json
    data: |-
      {
        "email": "carlos.mendoza@pymetech.co",
        "password": "Password123*"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          const data = res.getBody();
          bru.setEnvVar("token", data.access);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/token/pair"
      method: POST
      body:
        type: json
        data: |-
          {
            "password": "",
            "email": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "email": "",
            "refresh": "",
            "access": ""
          }
