info:
  name: Create Customer
  type: http
  seq: 2
  tags:
    - Inventory_-_Customers

http:
  method: POST
  url: "{{baseUrl}}/api/contacts/customers"
  body:
    type: json
    data: |-
      {
        "name": "Customer prueba",
        "identification": "424214",
        "email": "mfasda@gmail.com",
        "phone": "214124",
        "address": "2da"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
