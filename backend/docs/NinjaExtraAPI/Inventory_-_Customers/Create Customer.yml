    description: Created
    request:
      url: "{{baseUrl}}/api/contacts/customers"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "identification": "",
            "email": "",
            "phone": "",
            "address": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "company_id": "",
            "name": "",
            "identification": "",
            "email": "",
            "phone": "",
            "address": "",
            "created_at": "",
            "updated_at": ""
          }
